{% extends "base.html" %}

{% block title %}Join {{ trip.name }}{% endblock %}

{% block content %}
<main class="page-center">
  <div class="container-sm">
    <div class="card">
      <h1>Join the trip</h1>
      <p class="muted">You've been invited to <strong>{{ trip.name }}</strong> on {{ trip.date }} in {{ trip.location }}.</p>

      {% if error %}
      <div class="alert alert-error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/t/{{ trip.share_code }}/join" class="form">
        <label>Your name
          <input name="display_name" required autofocus placeholder="Jordan">
        </label>
        <button type="submit" class="btn btn-primary btn-block">Join trip</button>
      </form>
    </div>
  </div>
</main>
{% endblock %}
