{% extends "base.html" %}

{% block title %}Trip not found{% endblock %}

{% block content %}
<main class="min-h-screen flex items-center justify-center px-6 py-10">
  <div class="max-w-md w-full text-center">
    <h1 class="text-2xl font-bold mb-2">Trip not found</h1>
    <p class="text-gray-500 mb-4">
      No trip with code <strong>{{ code }}</strong> exists on this server.
      Trips saved in your browser from another computer or localhost won't appear here.
    </p>
    <a href="/" class="inline-flex items-center justify-center rounded-xl px-4 py-2.5 text-sm font-medium bg-blue-600 text-white hover:bg-blue-700 no-underline">Back to home</a>
  </div>
</main>
{% endblock %}
