<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Itinerary Planner{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
            display: ['Fraunces', 'Georgia', 'serif'],
          },
          colors: {
            canvas: '#fdf8f4',
            primary: {
              DEFAULT: '#e88870',
              hover: '#d87860',
              soft: '#ffece6',
              border: '#f5c8b8',
              'soft-text': '#a85a42',
              faded: '#ffd8cc',
              badge: '#ffe8df',
              'badge-text': '#b86a52',
            },
          },
          boxShadow: {
            timeline: '0 0 0 4px #ffd8cc',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/static/theme.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  {% block head %}{% endblock %}
  <script src="/static/trips.js?v=6"></script>
  <style>
    details summary { list-style: none; }
    details summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="bg-canvas text-neutral-900 antialiased leading-normal font-sans">
  {% block content %}{% endblock %}
  {% block page_styles %}{% endblock %}

  <div id="confirm-modal" class="fixed inset-0 z-[100] hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div id="confirm-backdrop" class="absolute inset-0 bg-black/40"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-5 border border-gray-200">
        <h2 id="confirm-title" class="text-base font-semibold mb-2">Are you sure?</h2>
        <p id="confirm-message" class="text-sm text-gray-600"></p>
        <div class="flex gap-2 mt-5 justify-end">
          <button type="button" id="confirm-no" class="inline-flex items-center justify-center rounded-xl px-4 py-2 text-sm font-medium bg-white text-neutral-900 border border-gray-200 hover:bg-gray-50">No</button>
          <button type="button" id="confirm-yes" class="inline-flex items-center justify-center rounded-xl px-4 py-2 text-sm font-medium bg-red-600 text-white hover:bg-red-700">Yes</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/confirm.js"></script>
</body>
</html>
