<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Itinerary Planner{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"DM Sans"', 'system-ui', 'sans-serif'],
            display: ['Fraunces', 'Georgia', 'serif'],
          },
          colors: {
            canvas: '#fdf8f4',
            join: {
              DEFAULT: '#6aabbf',
              hover: '#5599ad',
            },
            primary: {
              DEFAULT: '#c44632',
              hover: '#a83a28',
              soft: '#ffe4dc',
              border: '#e8b0a0',
              'soft-text': '#8a3828',
              faded: '#ffc8b8',
              badge: '#ffd4c8',
              'badge-text': '#8a3828',
            },
          },
          boxShadow: {
            timeline: '0 0 0 4px #ffd8cc',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="/static/theme.css?v=8">
  <link rel="stylesheet" href="/static/page-loading.css?v=1">
  <link rel="stylesheet" href="/static/lucide-icons.css?v=1">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:opsz,wght@9..144,600;9..144,700&display=swap" rel="stylesheet">
  {% block head %}{% endblock %}
  <link rel="stylesheet" href="/static/location-autocomplete.css?v=2">
  <link rel="stylesheet" href="/static/route-planner.css?v=5">
  <script src="/static/csrf.js?v=1"></script>
  <script src="/static/trips.js?v=7"></script>
  <style>
    details summary { list-style: none; }
    details summary::-webkit-details-marker { display: none; }
  </style>
</head>
<body class="bg-canvas text-neutral-900 antialiased leading-normal font-sans">
  <div id="page-loading" class="page-loading hidden" aria-hidden="true" aria-live="polite">
    <div class="page-loading__backdrop" aria-hidden="true"></div>
    <div class="page-loading__panel" role="status">
      <div class="page-loading__spinner" aria-hidden="true"></div>
      <span class="page-loading__label">Loading…</span>
    </div>
  </div>
  {% block content %}{% endblock %}
  {% block page_styles %}{% endblock %}

  <div id="confirm-modal" class="fixed inset-0 z-[100] hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div id="confirm-backdrop" class="absolute inset-0 bg-black/40"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-xl max-w-sm w-full p-5 border border-gray-200">
        <h2 id="confirm-title" class="text-base font-semibold mb-2">Are you sure?</h2>
        <p id="confirm-message" class="text-sm text-gray-600"></p>
        <div class="flex gap-2 mt-5 justify-end">
          <button type="button" id="confirm-no" class="inline-flex items-center justify-center rounded-xl px-4 py-2 text-sm font-medium bg-white text-neutral-900 border border-gray-200 hover:bg-gray-50">No</button>
          <button type="button" id="confirm-yes" class="inline-flex items-center justify-center rounded-xl px-4 py-2 text-sm font-medium bg-red-600 text-white hover:bg-red-700">Yes</button>
        </div>
      </div>
    </div>
  </div>
  <script src="/static/page-loading.js?v=1"></script>
  <script src="/static/confirm.js"></script>
  <script src="/static/location-autocomplete.js?v=3"></script>
  <script src="/static/country-data.js?v=1"></script>
  <script src="/static/route-planner.js?v=6"></script>
  <script src="/static/lucide.min.js?v=1"></script>
  <script src="/static/lucide-init.js?v=1"></script>
</body>
</html>
