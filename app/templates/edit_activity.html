{% extends "base.html" %}

{% block title %}Edit {{ activity.title }}{% endblock %}

{% block content %}
<header class="trip-header">
  <div class="container">
    <a href="/t/{{ trip.share_code }}" class="link-sm">← Back to board</a>
    <h1 class="mt-2">Edit activity</h1>
    <p class="muted">Update details for &ldquo;{{ activity.title }}&rdquo;</p>
  </div>
</header>

<main class="container pb-20">
  <div class="card" style="max-width: 32rem;">
    <form method="post" action="/t/{{ trip.share_code }}/activities/{{ activity.id }}/edit" class="form">
      <label>Title *
        <input name="title" required value="{{ activity.title }}">
      </label>
      <label>Location
        <input name="location" value="{{ activity.location or '' }}" placeholder="Address or place name near {{ trip.location }}">
        <span class="hint">Changing location refreshes the photo from Wikipedia</span>
      </label>
      <label>Link
        <input name="url" type="url" value="{{ activity.url or '' }}" placeholder="https://yelp.com/...">
      </label>
      <div class="form-row">
        <label>Suggested time
          <input name="suggested_time" type="time" value="{{ activity.suggested_time or '' }}">
        </label>
        <label>Duration (min)
          <input name="duration_min" type="number" value="{{ activity.duration_min }}" min="15" step="15">
        </label>
      </div>
      <label>Notes
        <textarea name="notes" rows="2" placeholder="Any extra details...">{{ activity.notes or '' }}</textarea>
      </label>
      <div class="flex gap-2 flex-wrap">
        <button type="submit" class="btn btn-primary">Save changes</button>
        <a href="/t/{{ trip.share_code }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </div>
</main>
{% endblock %}
