services:
  - type: web
    name: itinerary-planner
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: itinerary-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_PATH
        value: /var/data/group_day_planner.db
      - key: RENDER
        value: "true"
      - key: SECRET_KEY
        generateValue: true
